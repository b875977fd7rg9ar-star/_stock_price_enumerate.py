name: Run Python Script

on:
  schedule:
    #- cron: '0 09 * * *'
    - cron: '50 13 * * *'
  workflow_dispatch:

jobs:
  my_first_job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ライブラリインストール
        run: pip install yfinance

      - name: スクリプト実行
        run: python _stock_price_enumerate.py
